services:
  pocketbase:
    build: ./pocketbase
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    ports:
      - "${POCKETBASE_HOST_PORT:-8090}:8090"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_PB_URL: ${NEXT_PUBLIC_PB_URL:-http://localhost:8090}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PB_URL: ${NEXT_PUBLIC_PB_URL:-http://localhost:8090}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4.5}
      PB_APP_EMAIL: ${PB_APP_EMAIL}
      PB_APP_PASSWORD: ${PB_APP_PASSWORD}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      - pocketbase

volumes:
  pb_data:
    name: ${PB_DATA_VOLUME:-orden_fin_pb_data}
